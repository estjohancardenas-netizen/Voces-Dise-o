<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mapa de Historias — Ciudad en trazos</title>
  <link rel="stylesheet" href="style.css">
  <script src="app.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
  <!-- Google Maps will be used instead of Leaflet -->
</head>
<body class="app-page mapa-page dark-theme">


  <header class="app-header">
    <h1 class="screen-title marker-font">Mapa de Historias</h1>
    <div class="header-right">
      <button class="map-theme-toggle" onclick="toggleTheme()" aria-label="Cambiar tema">
         <svg id="themeIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="5"/>
          <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
           <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
           <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
           <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
         </svg>
         <span id="themeLabel">☀️ Claro</span>
        </button>
    </div>
    <div class="zona-segura">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>
      </svg>
      Zona Segura
    </div>
  </header>

  <div class="search-bar-container">
    <div class="search-bar">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="searchInput" placeholder="Buscar murales, artistas..." oninput="filterMurals(this.value)">
    </div>
  </div>

  <div class="filter-chips" id="filterChips"></div>

  <div class="mapa-main">
    <div id="map"></div>

    <div class="bottom-drawer">
      <div class="drawer-handle"></div>
      <div class="murals-nearby-header">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
        </svg>
        <span id="muralsCount">Cargando murales...</span>
        <svg class="chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="18 15 12 9 6 15"/>
        </svg>
      </div>
      <div class="murals-list" id="muralsList"></div>
    </div>
  </div>

  <nav class="bottom-nav" role="navigation" aria-label="Barra de navegación principal">
    <a href="mapa.html" class="nav-item" aria-label="Mapa - ver murales y rutas" title="Mapa">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/></svg>
      <span class="label">Mapa</span>
    </a>
    <a href="explorar.html" class="nav-item" aria-label="Descubrir - explorar obras" title="Descubrir">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <span class="label">Descubrir</span>
    </a>
    <a href="explorar.html" class="nav-item nav-center" aria-label="Iniciar visita" title="Iniciar visita">
      <div class="nav-center-btn" role="button" aria-pressed="false">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg>
      </div>
      <span class="label center-label">Iniciar</span>
    </a>
    <a href="colorea.html" class="nav-item" aria-label="Actividades - colorea y talleres" title="Actividades">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="13.5" cy="6.5" r=".5"/><circle cx="17.5" cy="10.5" r=".5"/><circle cx="8.5" cy="7.5" r=".5"/><circle cx="6.5" cy="12.5" r=".5"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z"/></svg>
      <span class="label">Actividades</span>
    </a>
    <a href="perfil.html" class="nav-item active" aria-label="Perfil - tu cuenta" aria-current="page" title="Perfil">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span class="label">Perfil</span>
      <div class="nav-dot" aria-hidden="true"></div>
    </a>
  </nav>

  <script src="nav.js"></script>
  <script>
    const murals = [
      {
        id: 1,
        name: "Invisibles: Retratos de la Calle",
        artist: "Toxicómano & DJ Lu",
        location: "La Candelaria",
        category: "memoria",
        lat: 4.5981,
        lng: -74.0759,
        img: "assets/images/invisibles-retratos.jpeg",
        audio_path: "audio/guia_invisibles.mp3"
      },
      {
        id: 2,
        name: "Mujer Wayuu: La Raíz del Tiempo",
        artist: "Carlos Trilleras",
        location: "Pasaje Chorro de Quevedo",
        category: "biodiversidad",
        lat: 4.5971,
        lng: -74.0749,
        img: "assets/images/mujer-wayuu.jpeg",
        audio_path: "audio/guia_wayuu.mp3"
      },
      {
        id: 3,
        name: "El Pez: Sonrisas de Rebeldía",
        artist: "El Pez (José Sabate)",
        location: "Distrito Graffiti",
        category: "territorio",
        lat: 4.6097, 
        lng: -74.0817,
        img: "assets/images/peces-sonrientes.jpeg",
        audio_path: "audio/guia_elpez.mp3"
      },
      { 
        id: 4, 
        name: "Jaguar Sagrado", 
        artist: "Toxicómano", 
        location: "Teusaquillo", 
        category: "biodiversidad", 
        lat: 4.6285, 
        lng: -74.0761, 
        img: "assets/images/jaguar-sagrado.jpeg",
        audio_path: "audio/guia_jaguar.mp3"
      },
      { 
        id: 5, 
        name: "Cóndor Andino", 
        artist: "Lesivo", 
        location: "Chapinero", 
        category: "memoria", 
        lat: 4.6480, 
        lng: -74.0612, 
        img: "assets/images/invisibles-retratos.jpeg",
        audio_path: "audio/guia_condor.mp3"
        }
      ];

      const categoryNames = { 
        memoria: "Resiliencia y Memoria", 
        biodiversidad: "Biodiversidad y Ancestros", 
        territorio: "Identidad de Territorio" 
      };

      const categoryColors = { 
        memoria: "#E85D04", 
        biodiversidad: "#10B981", 
        territorio: "#06B6D4" 
      };

      let map, markers = [], activeInterests = [], directionsService, directionsRenderer, userMarker = null, userPosition = null;

      function initMap() {
        activeInterests = JSON.parse(localStorage.getItem('vdm_interests') || '["memoria","biodiversidad","territorio"]');

        map = new google.maps.Map(document.getElementById('map'), {
          center: { lat: 4.6150, lng: -74.0750 },
          zoom: 13,
          mapId: 'cf6196aa70c7a9283065afe3',
          disableDefaultUI: true
        });

        console.log('Google Maps initialized');

        directionsService = new google.maps.DirectionsService();
        directionsRenderer = new google.maps.DirectionsRenderer({ map });

        // Update list when map view changes
        map.addListener('idle', () => {
          try { renderMuralsList(); updateCount(); } catch (e) { console.warn(e); }
        });

        // Add simple controls
        const locateBtn = document.createElement('button');
        locateBtn.textContent = 'Mi ubicación';
        locateBtn.className = 'gm-locate-btn';
        locateBtn.addEventListener('click', () => locateAndShowUser(true));
        map.controls[google.maps.ControlPosition.TOP_RIGHT].push(locateBtn);

        renderMarkers();
        renderFilterChips();
        renderMuralsList();
      }

      let infoWindow = null;
      function renderMarkers() {
        markers.forEach(m => { try { if (m.setMap) m.setMap(null); } catch(e){} });
        markers = [];

        const filtered = murals.filter(m => activeInterests.includes(m.category));

        filtered.forEach(mural => {
          const pos = { lat: mural.lat, lng: mural.lng };
          // Try to use AdvancedMarkerElement if available
          try {
            if (google.maps.marker && google.maps.marker.AdvancedMarkerElement) {
              const content = document.createElement('div');
              content.className = 'advanced-marker';
              content.style.width = '44px';
              content.style.height = '44px';
              content.style.borderRadius = '8px';
              content.style.overflow = 'hidden';
              content.style.boxShadow = '0 6px 18px rgba(0,0,0,0.4)';
              const img = document.createElement('img');
              img.src = mural.img;
              img.alt = mural.name;
              img.style.width = '100%';
              img.style.height = '100%';
              img.style.objectFit = 'cover';
              content.appendChild(img);

              const adv = new google.maps.marker.AdvancedMarkerElement({
                position: pos,
                map,
                content
              });
              google.maps.event.addListener(adv, 'click', () => {
                openMuralInfo(mural, pos);
              });
              markers.push(adv);
              return;
            }
          } catch (e) {
            console.warn('AdvancedMarkerElement not available', e);
          }

          // Fallback to classic marker
          const marker = new google.maps.Marker({
            position: pos,
            map,
            title: mural.name,
            icon: {
              url: mural.img,
              scaledSize: new google.maps.Size(40, 40)
            }
          });
          marker.addListener('click', () => openMuralInfo(mural, pos));
          markers.push(marker);
        });
        updateCount();
      }

      function openMuralInfo(mural, pos) {
        if (!infoWindow) infoWindow = new google.maps.InfoWindow();
        const html = `
          <div style="display:flex; gap:10px; width:260px;">
          <div style="width:80px; flex-shrink:0;">
            <img src="${mural.img}" style="width:80px;height:80px;object-fit:cover;border-radius:8px;" alt="${mural.name}"/>
          </div>
          <div style="flex:1;">
            <strong style="display:block;margin-bottom:6px;">${mural.name}</strong>
            <div style="font-size:0.85rem;color: #bbb; margin-bottom:8px;">${mural.artist} · ${mural.location}</div>
            <div style="display:flex;gap:6px;">
            <button style="flex:1;padding:8px;border-radius:8px;background:#1f2937;color:#fff;border:none;font-weight:700;" onclick="goToMural(${mural.id})">Ver</button>
            <button style="flex:1;padding:8px;border-radius:8px;background:linear-gradient(135deg,#E85D04,#FF7A2F);color:#fff;border:none;font-weight:700;" onclick="routeToMural(${mural.id})">Cómo llegar</button>
            </div>
          </div>
          </div>`;
        infoWindow.setContent(html);
        infoWindow.setPosition(pos);
        infoWindow.open(map);
      }

      function updateCount() {
        const bounds = map.getBounds();
        if (!bounds) return;
        const visibleMurals = murals.filter(m => 
          activeInterests.includes(m.category) && bounds.contains(new google.maps.LatLng(m.lat, m.lng))
        );
        document.getElementById('muralsCount').textContent = `${visibleMurals.length} obras en el sector señalado`;
      }

      function renderFilterChips() {
        const categories = ['memoria', 'biodiversidad', 'territorio'];
        const container = document.getElementById('filterChips');
        container.innerHTML = categories.map(cat => `
          <div class="chip ${activeInterests.includes(cat) ? 'active' : ''}" 
             style="--chip-color: ${categoryColors[cat]}"
             onclick="toggleFilter('${cat}')">
            ${categoryNames[cat]}
          </div>`).join('');
      }

      function toggleFilter(cat) {
        if (activeInterests.includes(cat)) {
          if (activeInterests.length === 1) return;
          activeInterests = activeInterests.filter(i => i !== cat);
        } else {
          activeInterests.push(cat);
        }
        localStorage.setItem('vdm_interests', JSON.stringify(activeInterests));
        renderMarkers();
        renderFilterChips();
        renderMuralsList();
      }

      function renderMuralsList() {
        const query = document.getElementById('searchInput')?.value.toLowerCase() || '';
        const bounds = map.getBounds(); 

        const visibleMurals = murals.filter(m => {
          const isInCategory = activeInterests.includes(m.category);
          const isInBounds = bounds ? bounds.contains(new google.maps.LatLng(m.lat, m.lng)) : true;
          const matchesQuery = !query || m.name.toLowerCase().includes(query) || m.artist.toLowerCase().includes(query);
          return isInCategory && isInBounds && matchesQuery;
        });

        document.getElementById('muralsCount').textContent = `${visibleMurals.length} obras en el sector señalado`;

        const container = document.getElementById('muralsList');
        if (visibleMurals.length === 0) {
          container.innerHTML = `<p style="padding:20px; color:gray; text-align:center; font-size:0.9rem;">No hay obras visibles en esta zona.</p>`;
          return;
        }

        container.innerHTML = visibleMurals.map(m => `
          <div class="mural-list-item">
            <div class="mural-list-thumb">
              <img src="${m.img}" alt="miniatura">
            </div>
            <div class="mural-list-info">
              <div class="category-tag" style="background:${categoryColors[m.category]}20; color:${categoryColors[m.category]}">${m.category.toUpperCase()}</div>
              <strong>${m.name}</strong>
              <span>${m.artist} · ${m.location}</span>
              <div class="mural-actions">
                <button onclick="goToMural(${m.id})">Ver</button>
                <button onclick="routeToMural(${m.id})">Cómo llegar</button>
              </div>
            </div>
          </div>`).join('');
      }

      function filterMurals() {
        renderMuralsList();
      }

      function goToMural(id) {
        window.location.href = `detalle.html?id=${id}`;
      }

      async function routeToMural(id) {
        const mural = murals.find(m => m.id === id);
        if (!mural) return;
        const dest = { lat: mural.lat, lng: mural.lng };
          try {
            if (!userPosition) {
              await locateAndShowUser(true);
            }
            const origin = userPosition || (map && map.getCenter ? map.getCenter().toJSON() : { lat: 4.6150, lng: -74.0750 });
            console.log('Routing from', origin, 'to', dest);
            calculateAndDisplayRoute(origin, dest);
          } catch (e) {
            console.error('routeToMural error', e);
          }
      }

      async function calculateAndDisplayRoute(origin, destination) {
        // Try the new Routes API first (if available)
        try {
          if (google && google.maps && google.maps.importLibrary) {
            const { Route } = await google.maps.importLibrary('routes');
            const request = {
              origin,
              destination,
              travelMode: 'WALKING',
              // request path and legs so we can draw polylines and show steps
              fields: ['path', 'legs'],
            };
            const { routes } = await Route.computeRoutes(request);
            if (routes && routes.length) {
              // clear previous route polylines
              if (window._routePolylines) { window._routePolylines.forEach(p => p.setMap(null)); }
              window._routePolylines = routes[0].createPolylines();
              window._routePolylines.forEach(p => p.setMap(map));

              // Fit map to route bounds (build from polylines)
              try {
                const bounds = new google.maps.LatLngBounds();
                window._routePolylines.forEach(poly => {
                  const path = poly.getPath();
                  for (let i = 0; i < path.getLength(); i++) bounds.extend(path.getAt(i));
                });
                map.fitBounds(bounds);
              } catch (e) { console.warn('Could not fit bounds to route', e); }

              // Add an in-map control button to close the route (no textual steps shown)
              try {
                addClearRouteControl();
              } catch (e) { /* ignore */ }

              return;
            }
          }
        } catch (e) {
          console.warn('Routes API computeRoutes failed', e);
        }

        // Do not call legacy DirectionsService to avoid legacy API errors.
        // If Routes API isn't available, fall back to a simple polyline + Google Maps link.

        // Final fallback: draw a simple polyline and open Google Maps directions
        try {
          if (window._fallbackPolyline) { window._fallbackPolyline.setMap(null); }
          window._fallbackPolyline = new google.maps.Polyline({
            path: [origin, destination],
            strokeColor: '#FF7A2F',
            strokeOpacity: 0.9,
            strokeWeight: 5,
            map
          });
          const b = new google.maps.LatLngBounds();
          b.extend(origin);
          b.extend(destination);
          map.fitBounds(b);
        } catch (e) { console.warn('Polyline fallback failed', e); }

        const oLat = origin.lat ?? origin.latitude ?? '';
        const oLng = origin.lng ?? origin.longitude ?? '';
        const dLat = destination.lat ?? destination.latitude ?? '';
        const dLng = destination.lng ?? destination.longitude ?? '';
        if (oLat !== '' && oLng !== '') {
          const mapsUrl = `https://www.google.com/maps/dir/?api=1&origin=${oLat},${oLng}&destination=${dLat},${dLng}&travelmode=walking`;
          window.open(mapsUrl, '_blank');
        } else {
          alert('No fue posible generar la ruta desde este dispositivo. Abre Google Maps manualmente para obtener indicaciones.');
        }
      }

      let _clearRouteControlElement = null;
      function addClearRouteControl() {
        try {
          if (!map || _clearRouteControlElement) return;
          const btn = document.createElement('button');
          btn.className = 'gm-clear-route';
          btn.style.background = 'linear-gradient(135deg,#E85D04,#FF7A2F)';
          btn.style.color = '#fff';
          btn.style.border = 'none';
          btn.style.padding = '8px 10px';
          btn.style.borderRadius = '8px';
          btn.style.fontWeight = '700';
          btn.style.cursor = 'pointer';
          btn.onclick = clearRoute;
          _clearRouteControlElement = btn;
          map.controls[google.maps.ControlPosition.TOP_RIGHT].push(btn);
        } catch (e) { console.warn('addClearRouteControl failed', e); }
      }

      function removeClearRouteControl() {
        try {
          if (!map || !_clearRouteControlElement) return;
          const arr = map.controls[google.maps.ControlPosition.TOP_RIGHT];
          for (let i = 0; i < arr.getLength(); i++) {
            if (arr.getAt(i) === _clearRouteControlElement) { arr.removeAt(i); break; }
          }
          _clearRouteControlElement = null;
        } catch (e) { console.warn('removeClearRouteControl failed', e); }
      }

      function clearRoute() {
        try {
          if (window._routePolylines) { window._routePolylines.forEach(p => p.setMap(null)); window._routePolylines = null; }
          if (window._fallbackPolyline) { window._fallbackPolyline.setMap(null); window._fallbackPolyline = null; }
          removeClearRouteControl();
        } catch (e) { console.warn('clearRoute failed', e); }
      }

      function locateAndShowUser(centerMap = false) {
        if (!navigator.geolocation) {
          alert('Geolocalización no disponible en este navegador');
          return;
        }
        navigator.geolocation.getCurrentPosition(pos => {
          userPosition = { lat: pos.coords.latitude, lng: pos.coords.longitude };
          if (!userMarker) {
            userMarker = new google.maps.Marker({
              position: userPosition,
              map,
              title: 'Tú',
              icon: {
                path: google.maps.SymbolPath.CIRCLE,
                scale: 7,
                fillColor: '#1976D2',
                fillOpacity: 1,
                strokeColor: 'white',
                strokeWeight: 2
              }
            });
          } else {
            userMarker.setPosition(userPosition);
            userMarker.setMap(map);
          }
          if (centerMap) map.setCenter(userPosition);
          console.log('User located:', userPosition);
        }, err => {
          console.error('Error obteniendo ubicación:', err);
        }, { enableHighAccuracy: true });
      }

      // Expose some functions to global scope for inline onclicks
      window.toggleFilter = toggleFilter;
      window.filterMurals = filterMurals;
      window.goToMural = goToMural;
      window.routeToMural = routeToMural;
      window.locateAndShowUser = locateAndShowUser;

      // Initialize when google maps script calls initMap via callback (script tag added below)
      // Also re-render list when map moves
      document.addEventListener('DOMContentLoaded', () => {
        // nothing here; init will be called by the Google Maps script callback
      });
      </script>

      <!-- Load Google Maps JS API (uses provided key and map id). Replace the key with env variable in a real deploy. -->
      <script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyARDUNZlA_pK1kk82xrmz6EecMHLTGSEHI&libraries=places,marker&v=weekly&callback=initMap"></script>
