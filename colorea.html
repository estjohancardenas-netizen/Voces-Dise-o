<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Colorea el Muro — Voces del Muro</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
</head>
<body class="app-page colorea-page">

  <header class="app-header">
    <h1 class="screen-title marker-font">Colorea el Muro</h1>
    <div class="pts-badge">⭐ <span id="totalPts">0</span> pts</div>
  </header>

  <div class="colorea-subtitle">Dale vida a los murales de Bogotá con tu creatividad</div>
  <div class="murals-available-header">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="13.5" cy="6.5" r=".5"/><circle cx="17.5" cy="10.5" r=".5"/><circle cx="8.5" cy="7.5" r=".5"/><circle cx="6.5" cy="12.5" r=".5"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z"/></svg>
    <span id="muralCount">5</span> murales disponibles
    <span class="pts-display">⭐ <span id="headerPts">0</span> pts</span>
  </div>

  <div class="colorea-grid" id="cologrid"></div>

  <div class="stencil-modal" id="stencilModal">
    <div class="stencil-header">
      <button class="stencil-close" onclick="closeStencil()">✕</button>
      <h3 class="marker-font" id="stencilTitle">Mural</h3>
      <button class="stencil-reset" onclick="resetCanvas()">↺</button>
    </div>
    <div class="stencil-progress-bar">
      <div class="stencil-progress-label">Progreso <span id="progressPct">0%</span></div>
      <div class="stencil-pts-badge" id="stencilPts">+0 pts</div>
    </div>
    <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
    <div class="stencil-canvas-wrap">
      <canvas id="stencilCanvas" width="340" height="280"></canvas>
      <div class="stencil-overlay-img" id="stencilOverlay"></div>
    </div>
    <div class="stencil-controls">
      <div class="brush-row">
        <div class="brush-label">Pincel</div>
        <button class="brush-size-btn" onclick="changeBrush(-5)">–</button>
        <div class="brush-preview" id="brushPreview"></div>
        <button class="brush-size-btn" onclick="changeBrush(5)">+</button>
      </div>
      <div class="palette-label">Paleta</div>
      <div class="color-palette" id="colorPalette"></div>
    </div>
  </div>
  <div class="stencil-backdrop" id="stencilBackdrop" onclick="closeStencil()"></div>

  <nav class="bottom-nav">
  <a href="mapa.html" class="nav-item">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/></svg>
      <span>Mapa</span>
    </a>
    <a href="explorar.html" class="nav-item">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <span>Explorar</span>
    </a>
    <a href="mapa.html" class="nav-item nav-center">
      <div class="nav-center-btn">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg>
      </div>
    </a>
    <a href="colorea.html" class="nav-item">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="13.5" cy="6.5" r=".5"/><circle cx="17.5" cy="10.5" r=".5"/><circle cx="8.5" cy="7.5" r=".5"/><circle cx="6.5" cy="12.5" r=".5"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z"/></svg>
      <span>Colorea</span>
    </a>
    <a href="perfil.html" class="nav-item active">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span>Perfil</span>
      <div class="nav-dot"></div>
    </a>
  </nav>

  <script src="nav.js"></script>
  <script>
    // DATOS ACTUALIZADOS CON TUS OBRAS REALES
    const muralsColorea = [
      { id:1, name:"Invisibles: Retratos", artist:"Toxicómano & DJ Lu", diff:"Difícil", pts:120, img:"assets/images/invisibles-retratos-color.jpeg" },
      { id:2, name:"Mujer Wayuu", artist:"Carlos Trilleras", diff:"Medio", pts:80, img:"assets/images/mujer-wayuu-color.jpeg" },
      { id:3, name:"Sonrisas de Rebeldía", artist:"El Pez", diff:"Fácil", pts:50, img:"assets/images/peces-sonrientes-color.jpeg" },
      { id:4, name:"Jaguar Sagrado", artist:"Toxicómano", diff:"Difícil", pts:120, img:"assets/images/jaguar-sagrado-color.jpeg" },
      { id:5, name:"Cóndor Andino", artist:"Lesivo", diff:"Medio", pts:80, img:"assets/images/invisibles-retratos-color.jpeg" }
    ];

    const diffColors = { "Fácil":"#10B981", "Medio":"#F59E0B", "Difícil":"#EF4444" };
    const palette = ["#E85D04","#06B6D4","#EF4444","#FBBF24","#10B981","#8B5CF6","#F472B6","#22C55E","#000000","#FFFFFF"];

    let userPts = parseInt(localStorage.getItem('vdm_pts') || '0');
    let currentMural = null;
    let brushSize = 12;
    let currentColor = "#E85D04";
    let isDrawing = false;

    function updatePtsDisplay() {
      document.getElementById('totalPts').textContent = userPts;
      document.getElementById('headerPts').textContent = userPts;
    }

    function renderGrid() {
      const saved = JSON.parse(localStorage.getItem('vdm_progress') || '{}');
      const grid = document.getElementById('cologrid');
      grid.innerHTML = muralsColorea.map(m => {
        const prog = saved[m.id] || 0;
        return `
        <div class="colorea-card" onclick="openStencil(${m.id})">
          <div class="colorea-card-img">
            <img src="${m.img}" alt="${m.name}" onerror="this.onerror=null;this.src='assets/images/invisibles-retratos-color.jpeg'">
            ${prog === 0 ? `<div class="colorea-card-overlay"><span class="colorea-start-icon">🎨</span></div>` : ''}
          </div>
          <div class="diff-badge" style="background:${diffColors[m.diff]}22;color:${diffColors[m.diff]}">${m.diff}</div>
          <div class="pts-badge-card">+${m.pts} pts</div>
          <div class="colorea-card-info">
            <strong>${m.name}</strong>
            <span>${m.artist}</span>
          </div>
          <div class="colorea-progress-row">
            <div class="colorea-mini-bar"><div class="colorea-mini-fill" style="width:${prog}%"></div></div>
            <span>${prog}%</span>
          </div>
        </div>`;
      }).join('');
    }

    function openStencil(id) {
      currentMural = muralsColorea.find(m => m.id === id);
      document.getElementById('stencilTitle').textContent = currentMural.name;
      document.getElementById('stencilPts').textContent = `+${currentMural.pts} pts`;
      document.getElementById('stencilModal').classList.add('active');
      document.getElementById('stencilBackdrop').classList.add('active');
      setupCanvas();
      renderPalette();
      updateBrushPreview();
    }

    function closeStencil() {
      document.getElementById('stencilModal').classList.remove('active');
      document.getElementById('stencilBackdrop').classList.remove('active');
      renderGrid();
    }

    function setupCanvas() {
      const canvas = document.getElementById('stencilCanvas');
      const ctx = canvas.getContext('2d');
      const overlay = document.getElementById('stencilOverlay');
      overlay.style.backgroundImage = `url(${currentMural.img})`;
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      updateProgress(0);
      setupDrawing(canvas, ctx);
    }

    function setupDrawing(canvas, ctx) {
      const getPos = (e) => {
        const r = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return { 
          x: (clientX - r.left) * (canvas.width / r.width), 
          y: (clientY - r.top) * (canvas.height / r.height) 
        };
      };

      const draw = (e) => {
        if (!isDrawing) return;
        e.preventDefault();
        const pos = getPos(e);
        ctx.globalAlpha = 0.6;
        ctx.fillStyle = currentColor;
        ctx.beginPath();
        ctx.arc(pos.x, pos.y, brushSize, 0, Math.PI * 2);
        ctx.fill();
        estimateProgress(ctx, canvas);
      };

      canvas.onmousedown = canvas.ontouchstart = (e) => { isDrawing = true; draw(e); };
      canvas.onmousemove = canvas.ontouchmove = draw;
      canvas.onmouseup = canvas.ontouchend = () => { isDrawing = false; };
    }

    function estimateProgress(ctx, canvas) {
      const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      let painted = 0;
      for (let i = 3; i < imgData.data.length; i += 4) {
        if (imgData.data[i] > 10) painted++;
      }
      // Cálculo aproximado de cobertura
      const pct = Math.min(Math.round((painted / (canvas.width * canvas.height)) * 250), 100);
      updateProgress(pct);
    }

    function updateProgress(pct=0) {
      document.getElementById('progressPct').textContent = pct + '%';
      document.getElementById('progressFill').style.width = pct + '%';
      
      if (currentMural) {
        const saved = JSON.parse(localStorage.getItem('vdm_progress') || '{}');
        if (pct > (saved[currentMural.id] || 0)) {
          const diff = pct - (saved[currentMural.id] || 0);
          if (diff >= 5) { 
            userPts += Math.floor(currentMural.pts * 0.05);
            localStorage.setItem('vdm_pts', userPts);
            saved[currentMural.id] = pct;
            localStorage.setItem('vdm_progress', JSON.stringify(saved));
            updatePtsDisplay();
          }
        }
      }
    }

    function resetCanvas() {
      const canvas = document.getElementById('stencilCanvas');
      canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
      updateProgress(0);
    }

    function renderPalette() {
      const container = document.getElementById('colorPalette');
      container.innerHTML = palette.map(c => `
        <div class="color-swatch ${c===currentColor?'active':''}" style="background:${c}" onclick="selectColor('${c}', this)"></div>
      `).join('');
    }

    function selectColor(color, el) {
      currentColor = color;
      document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
      el.classList.add('active');
      updateBrushPreview();
    }

    function changeBrush(delta) {
      brushSize = Math.max(4, Math.min(40, brushSize + delta));
      updateBrushPreview();
    }

    function updateBrushPreview() {
      const prev = document.getElementById('brushPreview');
      prev.style.width = prev.style.height = (brushSize * 2) + 'px';
      prev.style.background = currentColor;
    }

    updatePtsDisplay();
    document.getElementById('muralCount').textContent = muralsColorea.length;
    renderGrid();
  </script>
</body>
</html>
