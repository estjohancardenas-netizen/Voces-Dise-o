<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ciudad en Trazos — Arte Urbano</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
</head>
<body class="login-page">
  <div class="login-bg">
    <div class="graffiti-overlay"></div>
    <div class="noise-overlay"></div>
  </div>

  <div class="login-container">
    <div class="login-card">
      
      <div class="app-logo">
        <img src="logo.png" alt="Logo Ciudad en Trazos" class="main-logo">
      </div>

      <h1 class="app-title">Ciudad en<br>Trazos</h1>
      
      <p class="app-description">
        Trazos que guardan historias<br>
        <strong>voces que no se borran.</strong>
      </p>

      <div class="login-buttons">
        <a href="login.html" class="btn btn-primary">Iniciar sesión</a>
        <a href="register.html" class="btn btn-outline">Crear cuenta</a>

        <div class="social-optional" aria-hidden="false">
          <a href="#" class="btn btn-google">
            <svg width="18" height="18" viewBox="0 0 24 24"><path fill="white" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/></svg>
            Continuar con Google
          </a>

          <a href="#" class="btn btn-facebook">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
            Continuar con Facebook
          </a>
        </div>
      </div>

      <p class="terms-text">Al continuar, aceptas nuestros <a href="#">Términos de Servicio</a></p>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
