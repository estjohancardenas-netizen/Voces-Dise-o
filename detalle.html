<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voces del Muro — Detalle</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Space+Grotesk:wght@400;600&display=swap" rel="stylesheet">
</head>
<body class="app-page detail-page">

  <div class="detail-hero">
    <div class="detail-hero-overlay"></div>
    <div class="detail-hero-actions">
      <a href="javascript:history.back()" class="hero-btn">←</a>
    </div>
    <div class="detail-hero-img">
      <img src="" alt="" id="muralImg">
    </div>
  </div>

  <div class="detail-content">
    <div class="detail-tags" id="detailTags"></div>
    <h2 class="detail-title marker-font" id="detailTitle">Cargando...</h2>

    <div class="artist-row">
      <div class="artist-avatar" id="artistAvatar">?</div>
      <div class="artist-info">
        <strong id="artistName"></strong>
        <span id="muralSub"></span>
      </div>
    </div>

    <p class="detail-description" id="detailDesc"></p>

    <div class="audio-guide-card">
      <div class="audio-guide-label">● Audio Guía</div>
      <div class="audio-player">
        <div class="audio-track-info">
          <strong id="audioTitle">Escucha la historia</strong>
          <span id="audioArtist"></span>
        </div>
        <div class="waveform" id="waveform"></div>
        <div class="audio-controls">
          <span id="currentTime">0:00</span>
          <button class="audio-play-btn" id="playBtn" onclick="togglePlay()">PLAY</button>
          <span>3:45</span>
        </div>
      </div>
    </div>

    <nav class="bottom-nav">
  <a href="mapa.html" class="nav-item">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21"/></svg>
      <span>Mapa</span>
    </a>
    <a href="explorar.html" class="nav-item">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <span>Explorar</span>
    </a>
    <a href="mapa.html" class="nav-item nav-center">
      <div class="nav-center-btn">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg>
      </div>
    </a>
    <a href="colorea.html" class="nav-item">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="13.5" cy="6.5" r=".5"/><circle cx="17.5" cy="10.5" r=".5"/><circle cx="8.5" cy="7.5" r=".5"/><circle cx="6.5" cy="12.5" r=".5"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z"/></svg>
      <span>Colorea</span>
    </a>
    <a href="perfil.html" class="nav-item active">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span>Perfil</span>
      <div class="nav-dot"></div>
    </a>
</nav>

    <div class="detail-actions">
      <a href="mapa.html" class="detail-action-btn" id="btnVerMapa">Ver en Mapa</a>
    </div>
  </div>

  <script src="datos.js"></script>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const id = parseInt(urlParams.get('id')) || 1;
    const mural = muralsData[id];

    if (mural) {
      const muralImg = document.getElementById('muralImg');
      muralImg.src = mural.img;
      muralImg.onerror = () => {
        muralImg.src = 'https://picsum.photos/900/600?grayscale';
      };
      document.getElementById('detailTitle').textContent = mural.name;
      document.getElementById('artistName').textContent = mural.artist;
      document.getElementById('artistAvatar').textContent = mural.artist[0];
      document.getElementById('muralSub').textContent = `${mural.year} · ${mural.location}`;
      document.getElementById('detailDesc').textContent = mural.desc;
      document.getElementById('audioArtist').textContent = `Voz: Relato de ${mural.artist}`;
      document.getElementById('btnVerMapa').href = `mapa.html?id=${id}`;
      
      // Etiquetas
      document.getElementById('detailTags').innerHTML = mural.tags.map(tag =>
        `<span class="tag" style="background:${tagColors[tag]}22; color:${tagColors[tag]}">${tag}</span>`
      ).join('');
    }

    // Dibujar Waveform
    const wave = document.getElementById('waveform');
    for(let i=0; i<50; i++) {
      const b = document.createElement('div');
      b.className = 'wave-bar';
      b.style.height = (Math.random() * 25 + 5) + 'px';
      wave.appendChild(b);
    }

    let playing = false;
    function togglePlay() {
      playing = !playing;
      document.getElementById('playBtn').textContent = playing ? "PAUSE" : "PLAY";
    }
  </script>
</body>
</html>
