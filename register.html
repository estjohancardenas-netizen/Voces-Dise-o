<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Registrarse — Voces del Muro</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
</head>
<body class="auth-page">
  <div class="login-bg">
    <div class="graffiti-overlay"></div>
    <div class="noise-overlay"></div>
  </div>

  <div class="auth-container">
    <div class="auth-card">
      <div class="app-logo">
        <img src="logo.png" alt="Logo Ciudad en Trazos" class="main-logo">
      </div>
      <h2 class="auth-title">Crear cuenta</h2>
      <p class="auth-subtitle">Regístrate para guardar tus rutas y avances.</p>

      <form id="registerForm" class="auth-form">
        <label class="auth-label">Nombre
          <input class="auth-input" type="text" name="name" placeholder="Tu nombre">
        </label>
        <label class="auth-label">Email
          <input class="auth-input" type="email" name="email" required placeholder="correo@ejemplo.com">
        </label>
        <label class="auth-label">Contraseña
          <input class="auth-input" type="password" name="password" required minlength="6" placeholder="mínimo 6 caracteres">
        </label>
        <button type="submit" class="btn btn-primary auth-submit">Registrarse</button>
      </form>
      <p class="auth-switch">¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a></p>
      <p id="msg" class="auth-msg" aria-live="polite"></p>
    </div>
  </div>

  <script src="auth.js"></script>
  <script>
    const form = document.getElementById('registerForm');
    const msg = document.getElementById('msg');
    form.addEventListener('submit', async (e)=>{
      e.preventDefault();
      msg.className = 'auth-msg';
      msg.textContent='';
      const fd = new FormData(form);
      const data = {name: fd.get('name'), email: fd.get('email'), password: fd.get('password')};
      try{
        await Auth.register(data);
        msg.classList.add('success');
        msg.textContent = 'Registro correcto. Redirigiendo...';
        setTimeout(()=> location.href='mapa.html', 800);
      }catch(err){
        msg.classList.add('error');
        msg.textContent = err.message || 'Error';
      }
    });
  </script>
</body>
</html>
